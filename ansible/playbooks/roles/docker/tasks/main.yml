---
- name: Ensure required packages for apt over HTTPS are installed
  apt:
    name:
      - ca-certificates
      - curl
    update_cache: yes
    state: present

- name: Create keyring directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key
  get_url:
    url: "{{ docker_gpg_url }}"
    dest: "{{ docker_key_path }}"
    mode: '0644'

- name: Add Docker repository
  copy:
    dest: "{{ docker_repo_file }}"
    mode: '0644'
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/debian
      Suites: {{ ansible_facts['lsb']['codename'] }}
      Components: stable
      Signed-By: {{ docker_key_path }}

- name: Install Docker packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: yes
    state: present

- name: Ensure Docker service is active
  systemd:
    name: docker
    enabled: yes
    state: started

# Move Docker data directory to SSD
- name: Check if Docker data has already been migrated
  stat:
    path: "{{ docker_data_root }}"
  register: docker_ssd_check

- name: Stop Docker service for migration
  systemd:
    name: docker
    state: stopped
  when: docker_ssd_check.stat.exists == false and (ansible_facts['mounts'] | selectattr('mount', 'equalto', '/mnt/files') | list | length > 0)

- name: Create Docker data directory on SSD
  file:
    path: "{{ docker_data_root }}"
    state: directory
    owner: root
    group: root
    mode: '0710'
  when: docker_ssd_check.stat.exists == false

- name: Migrate existing Docker data to SSD (if needed)
  block:
    - name: Check if default Docker directory has data
      stat:
        path: /var/lib/docker
      register: default_docker_dir

    - name: Copy Docker data to SSD
      command: "cp -a /var/lib/docker/* {{ docker_data_root }}/"
      when: default_docker_dir.stat.exists and (default_docker_dir.stat.isdir)

    - name: Backup original Docker directory
      command: "mv /var/lib/docker /var/lib/docker.bak"
      when: default_docker_dir.stat.exists
  when: docker_ssd_check.stat.exists == false

- name: Create symlink from default Docker directory to SSD
  file:
    src: "{{ docker_data_root }}"
    dest: /var/lib/docker
    state: link
    force: yes
  when: docker_ssd_check.stat.exists == false

- name: Start Docker service
  systemd:
    name: docker
    state: started

- name: Create Docker prune script
  copy:
    dest: /usr/local/bin/docker-prune.sh
    mode: '0755'
    content: |
      #!/bin/bash
      # Prune unused Docker images older than 1 week
      docker image prune --all --filter="until=168h" --force
      echo "Docker prune completed at $(date)" >> /var/log/docker-prune.log
  notify: Enable Docker prune timer

- name: Create systemd service for Docker prune
  copy:
    dest: /etc/systemd/system/docker-prune.service
    content: |
      [Unit]
      Description=Docker Image Prune Service
      Requires=docker.service
      After=docker.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/docker-prune.sh
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
  notify: Reload systemd daemon

- name: Create systemd timer for Docker prune
  copy:
    dest: /etc/systemd/system/docker-prune.timer
    content: |
      [Unit]
      Description=Weekly Docker Image Prune Timer
      Requires=docker-prune.service

      [Timer]
      OnCalendar=weekly
      Persistent=true

      [Install]
      WantedBy=timers.target
  notify: Reload systemd daemon

- name: Enable and start Docker prune timer
  systemd:
    name: docker-prune.timer
    enabled: yes
    state: started
    daemon_reload: yes
