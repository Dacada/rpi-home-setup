---
- name: Ensure required packages for apt over HTTPS are installed
  apt:
    name:
      - ca-certificates
      - curl
    update_cache: yes
    state: present

- name: Create keyring directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key
  get_url:
    url: "{{ docker_gpg_url }}"
    dest: "{{ docker_key_path }}"
    mode: '0644'

- name: Add Docker repository
  copy:
    dest: "{{ docker_repo_file }}"
    mode: '0644'
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/debian
      Suites: {{ ansible_facts['lsb']['codename'] }}
      Components: stable
      Signed-By: {{ docker_key_path }}

- name: Install Docker packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: yes
    state: present

- name: Ensure Docker service is active
  systemd:
    name: docker
    enabled: yes
    state: started

# Move Docker data directory to SSD
- name: Check /var/lib/docker status
  stat:
    path: /var/lib/docker
  register: docker_lib_check

- name: Check if backup directory exists
  stat:
    path: /var/lib/docker.bak
  register: docker_backup_check

- name: Set migration conditions
  set_fact:
    docker_needs_migration: "{{ (docker_lib_check.stat.exists and docker_lib_check.stat.isdir) and (not docker_backup_check.stat.exists) }}"
    docker_already_migrated: "{{ (docker_lib_check.stat.exists and docker_lib_check.stat.islnk) and (docker_lib_check.stat.lnk_target == docker_data_root) }}"

- name: Fail if Docker migration is in uncertain state
  fail:
    msg: "/var/lib/docker exists but is not in an expected state (not a directory, not the correct symlink, and backup exists). Manual inspection required."
  when: not (docker_needs_migration or docker_already_migrated) and docker_lib_check.stat.exists

- name: Migrate Docker data to SSD
  block:
    - name: Stop Docker service for migration
      systemd:
        name: docker
        state: stopped

    - name: Create Docker data directory on SSD
      file:
        path: "{{ docker_data_root }}"
        state: directory
        owner: root
        group: root
        mode: '0710'

    - name: Copy Docker data to SSD
      command: "cp -a /var/lib/docker/* {{ docker_data_root }}/"

    - name: Backup original Docker directory
      command: "mv /var/lib/docker /var/lib/docker.bak"

    - name: Create symlink from default Docker directory to SSD
      file:
        src: "{{ docker_data_root }}"
        dest: /var/lib/docker
        state: link

    - name: Start Docker service
      systemd:
        name: docker
        state: started
  when: docker_needs_migration and (ansible_facts['mounts'] | selectattr('mount', 'equalto', '/mnt/files') | list | length > 0)

- name: Ensure Docker service is running
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Deploy Docker prune script
  template:
    src: docker-prune.sh.j2
    dest: /usr/local/bin/docker-prune.sh
    mode: '0755'

- name: Deploy Docker prune systemd service
  template:
    src: docker-prune.service.j2
    dest: /etc/systemd/system/docker-prune.service

- name: Deploy Docker prune systemd timer
  template:
    src: docker-prune.timer.j2
    dest: /etc/systemd/system/docker-prune.timer
  register: timer_deployed

- name: Reload systemd daemon if timer changed
  systemd:
    daemon_reload: yes
  when: timer_deployed.changed

- name: Enable and start Docker prune timer
  systemd:
    name: docker-prune.timer
    enabled: yes
    state: started
